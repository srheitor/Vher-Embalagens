<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Vhêr Embalagens</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <div class="logo">Vhêr Embalagens</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Produtos</a>
        <a href="about.html">Sobre nós</a>
        <a href="contact.html">Contato</a>
    </nav>
</header>

<div class="container">
    <h1 class="section-title">Nossos Produtos</h1>
    <div class="grid" id="grid-produtos">
        <p>Carregando catálogo...</p>
    </div>
</div>

<footer>
    <p>© 2026 Vhêr Embalagens</p>
</footer>

<script>
    const DB_URL = "https://apovigktqhebeeuodexa.supabase.co";
    const DB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwb3ZpZ2t0cWhlYmVldW9kZXhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDQ0ODEsImV4cCI6MjA4OTA4MDQ4MX0.sFjMS2KgdwGeTziaazHSAadDEwQlroMC_7rtS_2EIww";

    const _supabase = supabase.createClient(DB_URL, DB_KEY);

    async function carregarProdutos() {
        const { data, error } = await _supabase
            .from('produtos')
            .select('*');

        const grid = document.getElementById('grid-produtos');

        if (error) {
            console.error(error);
            grid.innerHTML = "<p>Erro ao carregar produtos.</p>";
            return;
        }

        grid.innerHTML = data.map(prod => `
            <div class="card">
                <img class="product-img" src="${prod.foto || 'img/placeholder.jpg'}" alt="${prod.nome_produto}">
                <h2>${prod.nome_produto}</h2>
                <p>${prod.descricao}</p>
                <a href="https://wa.link/4g6coj" target="_blank"><button class="btn-contact">Orçamento via WhatsApp</button></a>
            </div>
        `).join('');
    }

    carregarProdutos();
</script>
<footer>
    <p>© 2026 Vhêr Embalagens</p>
</footer>

</body>
</html>
