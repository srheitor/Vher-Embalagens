<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

</head>
<body>

<header>
    <div class="logo">Vhêr Embalagens</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Produtos</a>
        <a href="about.html">Sobre nós</a>
        <a href="contact.html">Contato</a>
    </nav>
</header>

<div class="container contact-container">
    <h1 class="section-title">Entre em Contato</h1>

    <div class="social-links">
        <a class="whatsapp" href="https://wa.link/4g6coj" target="_blank">WhatsApp</a>
        <a class="instagram" href="https://www.instagram.com/vher_embalagens/" target="_blank">Instagram</a>
    </div>

    <form action="mailto:contato@vherembalagens.com.br" method="post" enctype="text/plain">
        <input type="text" placeholder="Seu nome" required>
        <input type="email" placeholder="Seu e-mail" required>
        <textarea rows="5" placeholder="Como podemos ajudar? (Ex: Orçamento de 1000 caixas de pizza)"></textarea>
        <button type="submit" class="btn-contact" style="font-size: 18px;">Enviar Mensagem por E-mail</button>
    </form>
</div>

<footer>
    <p>© 2026 Vhêr Embalagens</p>
</footer>
